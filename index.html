<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Долги и бюджет — помесячно</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px 40px;
            color: #0f172a;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .total-card {
            background: #0f172a;
            color: white;
            border-radius: 32px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            text-align: center;
        }
        .total-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .total-amount {
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 4px;
            color: #facc15;
        }
        .creditors-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }
        .cred-card {
            background: white;
            border-radius: 24px;
            padding: 12px 16px;
            flex: 1 1 140px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .cred-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
        }
        .cred-amount {
            font-weight: 800;
            font-size: 1.2rem;
            margin-top: 4px;
            color: #0f172a;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .budget-row {
            margin-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .budget-row label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: #334155;
        }
        .budget-row input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 1rem;
            background: white;
        }
        .month-result {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        .month-result p {
            margin: 4px 0;
        }
        .note {
            background: #fef9c3;
            border-radius: 20px;
            padding: 12px;
            font-size: 0.85rem;
            margin-top: 16px;
        }
        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
            margin-top: 20px;
        }
        button {
            background: #f97316;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Долги + бюджет</h1>

    <div class="total-card">
        <div class="total-label">Остаток долга всего</div>
        <div class="total-amount" id="totalAmount">0 ₽</div>
    </div>

    <div class="creditors-grid" id="creditorsBlock"></div>

    <div id="app"></div>

    <div class="footer">
        📌 Все данные сохраняются в телефоне.
    </div>
</div>

<script>
    // Долги (тело)
    let debts = {
        sber: 152341,
        tbank: 82632,
        yandex: 97097,
        alfa_loan: 35325,
        alfa_card: 17412
    };

    // Данные по месяцам (сохраняем)
    let monthsData = {
        april: { name: "Апрель", income: 126000, life: 39000, save: 50000 },
        may: { name: "Май", income: 126000, life: 39000, save: 50000 },
        june: { name: "Июнь", income: 126000, life: 39000, save: 50000 },
        july: { name: "Июль", income: 126000, life: 39000, save: 50000 },
        august: { name: "Август", income: 126000, life: 39000, save: 50000 },
        september: { name: "Сентябрь", income: 126000, life: 39000, save: 50000 },
        october: { name: "Октябрь", income: 126000, life: 39000, save: 50000 }
    };

    try {
        const savedDebts = localStorage.getItem("budget_debts");
        if (savedDebts) {
            const d = JSON.parse(savedDebts);
            debts = d;
        }
        const savedMonths = localStorage.getItem("budget_months");
        if (savedMonths) {
            monthsData = JSON.parse(savedMonths);
        }
    } catch(e) {}

    function saveAll() {
        localStorage.setItem("budget_debts", JSON.stringify(debts));
        localStorage.setItem("budget_months", JSON.stringify(monthsData));
        updateDisplays();
        render();
    }

    function updateDisplays() {
        const total = debts.sber + debts.tbank + debts.yandex + debts.alfa_loan + debts.alfa_card;
        document.getElementById("totalAmount").innerText = total.toLocaleString('ru-RU') + " ₽";
        const creditorsDiv = document.getElementById("creditorsBlock");
        creditorsDiv.innerHTML = `
            <div class="cred-card"><div class="cred-name">🏦 Сбер</div><div class="cred-amount">${debts.sber.toLocaleString('ru-RU')} ₽</div></div>
            <div class="cred-card"><div class="cred-name">🏦 Т‑банк</div><div class="cred-amount">${debts.tbank.toLocaleString('ru-RU')} ₽</div></div>
            <div class="cred-card"><div class="cred-name">🔁 Яндекс</div><div class="cred-amount">${debts.yandex.toLocaleString('ru-RU')} ₽</div></div>
            <div class="cred-card"><div class="cred-name">🔁 Альфа (займ)</div><div class="cred-amount">${debts.alfa_loan.toLocaleString('ru-RU')} ₽</div></div>
            <div class="cred-card"><div class="cred-name">💳 Альфа (кред)</div><div class="cred-amount">${debts.alfa_card.toLocaleString('ru-RU')} ₽</div></div>
        `;
    }

    function render() {
        const app = document.getElementById("app");
        if (!app) return;
        let html = "";
        for (const [key, month] of Object.entries(monthsData)) {
            const afterLife = month.income - month.life;
            const afterSave = afterLife - month.save;
            html += `
                <div class="card">
                    <h2>📆 ${month.name}</h2>
                    <div class="budget-row">
                        <label>💰 Заработал (₽)</label>
                        <input type="number" class="income-input" data-month="${key}" value="${month.income}">
                    </div>
                    <div class="budget-row">
                        <label>🏠 На жизнь (₽)</label>
                        <input type="number" class="life-input" data-month="${key}" value="${month.life}">
                    </div>
                    <div class="budget-row">
                        <label>🐖 В копилку (₽)</label>
                        <input type="number" class="save-input" data-month="${key}" value="${month.save}">
                    </div>
                    <div class="month-result">
                        <p>📊 После жизни: <strong>${afterLife.toLocaleString('ru-RU')} ₽</strong></p>
                        <p>🎯 После копилки: <strong>${afterSave.toLocaleString('ru-RU')} ₽</strong></p>
                    </div>
                    <button class="save-month-btn" data-month="${key}">💾 Сохранить</button>
                </div>
            `;
        }
        app.innerHTML = html;

        document.querySelectorAll(".income-input, .life-input, .save-input").forEach(input => {
            input.addEventListener("change", function() {
                const monthKey = this.getAttribute("data-month");
                const val = parseFloat(this.value) || 0;
                if (this.classList.contains("income-input")) monthsData[monthKey].income = val;
                if (this.classList.contains("life-input")) monthsData[monthKey].life = val;
                if (this.classList.contains("save-input")) monthsData[monthKey].save = val;
                saveAll();
            });
        });

        document.querySelectorAll(".save-month-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                const monthKey = this.getAttribute("data-month");
                const month = monthsData[monthKey];
                alert(`✅ Данные за ${month.name} сохранены:\n💰 Заработал: ${month.income.toLocaleString('ru-RU')} ₽\n🏠 На жизнь: ${month.life.toLocaleString('ru-RU')} ₽\n🐖 В копилку: ${month.save.toLocaleString('ru-RU')} ₽`);
            });
        });
    }

    updateDisplays();
    render();
</script>
</body>
</html>
