<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>План погашения долгов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px 40px;
            color: #0f172a;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .total-card {
            background: #0f172a;
            color: white;
            border-radius: 32px;
            padding: 1rem;
            margin: 12px 0 20px;
            text-align: center;
        }
        .total-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .total-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: #facc15;
        }
        .reminder-note {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .debts-editor {
            background: white;
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .debts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .debt-edit {
            flex: 1 1 140px;
        }
        .debt-edit label {
            font-size: 0.7rem;
            font-weight: 600;
            display: block;
            color: #475569;
        }
        .debt-edit input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .creditor-block {
            border-top: 1px solid #e2e8f0;
            margin-top: 12px;
            padding-top: 12px;
        }
        .creditor-title {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .payment-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .payment-field {
            flex: 1;
        }
        .payment-field label {
            font-size: 0.7rem;
            display: block;
            color: #475569;
        }
        .payment-field input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .remain {
            font-size: 0.7rem;
            color: #f97316;
            margin-top: 4px;
            font-weight: 500;
        }
        .life-save-row {
            display: flex;
            gap: 12px;
            margin: 16px 0 12px;
        }
        .life-save-field {
            flex: 1;
        }
        .life-save-field label {
            font-size: 0.7rem;
            font-weight: 600;
            display: block;
        }
        .life-save-field input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
        }
        .savings-total {
            font-size: 0.75rem;
            background: #e6f0ff;
            padding: 6px 10px;
            border-radius: 20px;
            margin-top: 8px;
        }
        .save-btn {
            background: #f97316;
            border: none;
            border-radius: 40px;
            padding: 8px;
            color: white;
            font-weight: 500;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 План погашения</h1>
    <div class="total-card">
        <div class="total-label">Напоминалка (общий долг)</div>
        <div class="total-amount" id="totalAmount">0 ₽</div>
        <div class="reminder-note">⚠️ Это просто напоминание, не меняется от платежей</div>
    </div>

    <div class="debts-editor">
        <div style="font-weight: 600; margin-bottom: 8px;">✏️ Редактируй текущие остатки долгов</div>
        <div class="debts-grid" id="debtsEditor"></div>
    </div>

    <div id="app"></div>
    <div class="footer">📌 Все данные сохраняются. Копилка накапливается помесячно.</div>
</div>

<script>
    // Текущие остатки долгов (можно редактировать)
    let debts = {
        sber: 152341,
        tbank: 82632,
        yandex: 97097,
        alfa: 52737,
        babushka: 270000
    };

    // План по месяцам (вносимые суммы, проценты, жизнь, копилка)
    let monthsData = {
        april: { name: "Апрель", income: 126000,
            payments: {
                sber: { paid: 50000, interest: 4000 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            life: 39000, save: 20000
        },
        may: { name: "Май", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            life: 39000, save: 20000
        },
        june: { name: "Июнь", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            life: 39000, save: 20000
        },
        july: { name: "Июль", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            life: 39000, save: 20000
        },
        august: { name: "Август", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            life: 39000, save: 20000
        },
        september: { name: "Сентябрь", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            life: 39000, save: 20000
        }
    };

    // Функция для вычисления накопленной копилки по месяцам
    function getCumulativeSave(monthKey) {
        const order = ["april", "may", "june", "july", "august", "september"];
        let total = 0;
        for (let m of order) {
            total += monthsData[m]?.save || 0;
            if (m === monthKey) break;
        }
        return total;
    }

    // Сохранение / загрузка
    try {
        const savedDebts = localStorage.getItem("plan_debts");
        if (savedDebts) debts = JSON.parse(savedDebts);
        const savedMonths = localStorage.getItem("plan_months");
        if (savedMonths) monthsData = JSON.parse(savedMonths);
    } catch(e) {}

    function saveAll() {
        localStorage.setItem("plan_debts", JSON.stringify(debts));
        localStorage.setItem("plan_months", JSON.stringify(monthsData));
        updateTotalDisplay();
        render();
    }

    function updateTotalDisplay() {
        const total = debts.sber + debts.tbank + debts.yandex + debts.alfa + debts.babushka;
        document.getElementById("totalAmount").innerText = total.toLocaleString('ru-RU') + " ₽";
        // обновляем редактор долгов
        const editorDiv = document.getElementById("debtsEditor");
        editorDiv.innerHTML = `
            <div class="debt-edit"><label>🏦 Сбер</label><input type="number" id="edit_sber" value="${debts.sber}"></div>
            <div class="debt-edit"><label>🏦 Т‑банк</label><input type="number" id="edit_tbank" value="${debts.tbank}"></div>
            <div class="debt-edit"><label>🔁 Яндекс</label><input type="number" id="edit_yandex" value="${debts.yandex}"></div>
            <div class="debt-edit"><label>🔁 Альфа</label><input type="number" id="edit_alfa" value="${debts.alfa}"></div>
            <div class="debt-edit"><label>👵 Бабушка</label><input type="number" id="edit_babushka" value="${debts.babushka}"></div>
        `;
        document.getElementById("edit_sber")?.addEventListener("change", (e) => { debts.sber = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_tbank")?.addEventListener("change", (e) => { debts.tbank = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_yandex")?.addEventListener("change", (e) => { debts.yandex = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_alfa")?.addEventListener("change", (e) => { debts.alfa = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_babushka")?.addEventListener("change", (e) => { debts.babushka = parseFloat(e.target.value) || 0; saveAll(); });
    }

    function render() {
        const app = document.getElementById("app");
        if (!app) return;
        let html = "";
        const monthsOrder = ["april", "may", "june", "july", "august", "september"];
        for (const monthKey of monthsOrder) {
            const month = monthsData[monthKey];
            if (!month) continue;
            const cumSave = getCumulativeSave(monthKey);
            html += `<div class="card">
                <h2>📆 ${month.name}</h2>
                <div class="creditor-block">
                    <div class="creditor-title">🏦 Сбер</div>
                    <div class="payment-row">
                        <div class="payment-field"><label>Вношу (₽)</label><input type="number" class="payment-paid" data-month="${monthKey}" data-creditor="sber" value="${month.payments.sber.paid}"></div>
                        <div class="payment-field"><label>Проценты (₽)</label><input type="number" class="payment-interest" data-month="${monthKey}" data-creditor="sber" value="${month.payments.sber.interest}"></div>
                    </div>
                    <div class="remain" id="remain-sber-${monthKey}"></div>
                </div>
                <div class="creditor-block">
                    <div class="creditor-title">🏦 Т‑банк</div>
                    <div class="payment-row">
                        <div class="payment-field"><label>Вношу (₽)</label><input type="number" class="payment-paid" data-month="${monthKey}" data-creditor="tbank" value="${month.payments.tbank.paid}"></div>
                        <div class="payment-field"><label>Проценты (₽)</label><input type="number" class="payment-interest" data-month="${monthKey}" data-creditor="tbank" value="${month.payments.tbank.interest}"></div>
                    </div>
                    <div class="remain" id="remain-tbank-${monthKey}"></div>
                </div>
                <div class="creditor-block">
                    <div class="creditor-title">🔁 Яндекс</div>
                    <div class="payment-row">
                        <div class="payment-field"><label>Вношу (₽)</label><input type="number" class="payment-paid" data-month="${monthKey}" data-creditor="yandex" value="${month.payments.yandex.paid}"></div>
                        <div class="payment-field"><label>Проценты (₽)</label><input type="number" class="payment-interest" data-month="${monthKey}" data-creditor="yandex" value="${month.payments.yandex.interest}"></div>
                    </div>
                    <div class="remain" id="remain-yandex-${monthKey}"></div>
                </div>
                <div class="creditor-block">
                    <div class="creditor-title">🔁 Альфа</div>
                    <div class="payment-row">
                        <div class="payment-field"><label>Вношу (₽)</label><input type="number" class="payment-paid" data-month="${monthKey}" data-creditor="alfa" value="${month.payments.alfa.paid}"></div>
                        <div class="payment-field"><label>Проценты (₽)</label><input type="number" class="payment-interest" data-month="${monthKey}" data-creditor="alfa" value="${month.payments.alfa.interest}"></div>
                    </div>
                    <div class="remain" id="remain-alfa-${monthKey}"></div>
                </div>
                <div class="creditor-block">
                    <div class="creditor-title">👵 Бабушка</div>
                    <div class="payment-row">
                        <div class="payment-field"><label>Вношу (₽)</label><input type="number" class="payment-paid" data-month="${monthKey}" data-creditor="babushka" value="${month.payments.babushka.paid}"></div>
                        <div class="payment-field"><label>Проценты (₽)</label><input type="number" class="payment-interest" data-month="${monthKey}" data-creditor="babushka" value="${month.payments.babushka.interest}"></div>
                    </div>
                    <div class="remain" id="remain-babushka-${monthKey}"></div>
                </div>
                <div class="life-save-row">
                    <div class="life-save-field"><label>🏠 На жизнь (₽)</label><input type="number" class="life-input" data-month="${monthKey}" value="${month.life}"></div>
                    <div class="life-save-field"><label>🐖 В копилку (₽)</label><input type="number" class="save-input" data-month="${monthKey}" value="${month.save}"></div>
                </div>
                <div class="savings-total">💰 Всего в копилке на этот месяц: <strong>${cumSave.toLocaleString('ru-RU')} ₽</strong></div>
                <button class="save-month-btn" data-month="${monthKey}">💾 Сохранить план на месяц</button>
            </div>`;
        }
        app.innerHTML = html;

        // Вычисляем остатки после платежей
        for (const monthKey of monthsOrder) {
            const month = monthsData[monthKey];
            for (const creditor of ["sber", "tbank", "yandex", "alfa", "babushka"]) {
                const paid = month.payments[creditor]?.paid || 0;
                const interest = month.payments[creditor]?.interest || 0;
                const body = paid - interest;
                const currentDebt = debts[creditor];
                const after = currentDebt - body;
                const remainSpan = document.getElementById(`remain-${creditor}-${monthKey}`);
                if (remainSpan) {
                    if (paid > 0) {
                        remainSpan.innerText = `📉 После платежа останется: ${after.toLocaleString('ru-RU')} ₽`;
                    } else {
                        remainSpan.innerText = ``;
                    }
                }
            }
        }

        // Обработчики
        document.querySelectorAll(".payment-paid, .payment-interest, .life-input, .save-input").forEach(input => {
            input.addEventListener("change", function() {
                const monthKey = this.getAttribute("data-month");
                const month = monthsData[monthKey];
                const creditor = this.getAttribute("data-creditor");
                if (creditor && this.classList.contains("payment-paid")) {
                    month.payments[creditor].paid = parseFloat(this.value) || 0;
                }
                if (creditor && this.classList.contains("payment-interest")) {
                    month.payments[creditor].interest = parseFloat(this.value) || 0;
                }
                if (this.classList.contains("life-input")) {
                    month.life = parseFloat(this.value) || 0;
                }
                if (this.classList.contains("save-input")) {
                    month.save = parseFloat(this.value) || 0;
                }
                saveAll();
                render();
            });
        });

        document.querySelectorAll(".save-month-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                const monthKey = this.getAttribute("data-month");
                const month = monthsData[monthKey];
                alert(`✅ План на ${month.name} сохранён.`);
                saveAll();
            });
        });
    }

    updateTotalDisplay();
    render();
</script>
</body>
</html>
