<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мои финансы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .app {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .balance {
            background: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .balance-amount {
            font-size: 40px;
            font-weight: 700;
            margin: 10px 0;
        }

        .balance-stats {
            display: flex;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .positive { color: #4ade80; }
        .negative { color: #f87171; }

        .card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .payment-item {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #f97316;
        }

        .payment-item.paid {
            border-left-color: #10b981;
            opacity: 0.8;
        }

        .payment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .payment-title {
            font-weight: 600;
        }

        .payment-amount {
            font-weight: 700;
            color: #ef4444;
        }

        .payment-amount.paid {
            color: #10b981;
        }

        .payment-footer {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #64748b;
        }

        .payment-timer {
            background: #ffedd5;
            padding: 3px 10px;
            border-radius: 20px;
            color: #9a3412;
        }

        .payment-timer.paid {
            background: #dcfce7;
            color: #166534;
        }

        .payment-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        .btn-blue {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn-red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .badge {
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .badge.orange {
            background: #ffedd5;
            color: #9a3412;
        }

        .badge.red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>💰 Мои финансы</h1>

    <!-- Баланс -->
    <div class="balance">
        <div>Баланс</div>
        <div class="balance-amount" id="balanceAmount">30 100 ₽</div>
        <div class="balance-stats">
            <div class="stat-item">
                <div>Доходы</div>
                <div class="stat-value positive" id="incomeAmount">95 842 ₽</div>
            </div>
            <div class="stat-item">
                <div>Расходы</div>
                <div class="stat-value negative" id="expenseAmount">65 742 ₽</div>
            </div>
        </div>
    </div>

    <!-- Обязательные платежи -->
    <div class="card">
        <div class="card-header">
            <span>📌 Обязательные</span>
            <span class="badge orange" id="nextPayment">6 д</span>
            <span class="badge red" id="totalPayments">30 100 ₽</span>
        </div>
        
        <div id="paymentsList">
            <div class="payment-item">
                <div class="payment-header">
                    <span class="payment-title">Квартплата</span>
                    <span class="payment-amount">17 500 ₽</span>
                </div>
                <div class="payment-footer">
                    <span>📅 21 марта</span>
                    <span class="payment-timer">⏱ 5 д</span>
                </div>
                <div class="payment-buttons">
                    <button class="btn-small btn-blue" onclick="payPayment(1)">✅ Оплатить</button>
                    <button class="btn-small btn-red" onclick="deletePayment(1)">❌ Удалить</button>
                </div>
            </div>

            <div class="payment-item">
                <div class="payment-header">
                    <span class="payment-title">Интернет</span>
                    <span class="payment-amount">600 ₽</span>
                </div>
                <div class="payment-footer">
                    <span>📅 16 марта</span>
                    <span class="payment-timer">⏱ Сегодня</span>
                </div>
                <div class="payment-buttons">
                    <button class="btn-small btn-blue" onclick="payPayment(2)">✅ Оплатить</button>
                    <button class="btn-small btn-red" onclick="deletePayment(2)">❌ Удалить</button>
                </div>
            </div>

            <div class="payment-item">
                <div class="payment-header">
                    <span class="payment-title">Кредит</span>
                    <span class="payment-amount">12 000 ₽</span>
                </div>
                <div class="payment-footer">
                    <span>📅 10 марта</span>
                    <span class="payment-timer">⏱ Просрочено</span>
                </div>
                <div class="payment-buttons">
                    <button class="btn-small btn-blue" onclick="payPayment(3)">✅ Оплатить</button>
                    <button class="btn-small btn-red" onclick="deletePayment(3)">❌ Удалить</button>
                </div>
            </div>
        </div>

        <!-- Форма добавления -->
        <div style="margin-top: 20px;">
            <input type="text" id="paymentTitle" placeholder="Название платежа">
            <input type="number" id="paymentAmount" placeholder="Сумма">
            <input type="date" id="paymentDate" value="2026-03-16">
            <button class="btn-primary" onclick="addPayment()">➕ Добавить платёж</button>
        </div>
    </div>
</div>

<script>
    let payments = [
        { id: 1, title: 'Квартплата', amount: 17500, date: '2026-03-21', paid: false },
        { id: 2, title: 'Интернет', amount: 600, date: '2026-03-16', paid: false },
        { id: 3, title: 'Кредит', amount: 12000, date: '2026-03-10', paid: false }
    ];

    function updateDisplay() {
        const list = document.getElementById('paymentsList');
        let html = '';
        let totalUnpaid = 0;
        let nextDays = null;

        payments.sort((a,b) => new Date(a.date) - new Date(b.date));

        payments.forEach(p => {
            if (!p.paid) totalUnpaid += p.amount;
            
            const today = new Date();
            const dueDate = new Date(p.date);
            const diffDays = Math.ceil((dueDate - today) / (1000*60*60*24));
            
            let timerText = '';
            if (p.paid) timerText = 'Оплачено';
            else if (diffDays < 0) timerText = 'Просрочено';
            else if (diffDays === 0) timerText = 'Сегодня';
            else timerText = diffDays + ' д';

            if (!p.paid && (nextDays === null || diffDays < nextDays) && diffDays >= 0) {
                nextDays = diffDays;
            }

            const dueStr = dueDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
            
            html += `
                <div class="payment-item ${p.paid ? 'paid' : ''}">
                    <div class="payment-header">
                        <span class="payment-title">${p.title}</span>
                        <span class="payment-amount ${p.paid ? 'paid' : ''}">${p.amount.toLocaleString()} ₽</span>
                    </div>
                    <div class="payment-footer">
                        <span>📅 ${dueStr}</span>
                        <span class="payment-timer ${p.paid ? 'paid' : ''}">⏱ ${timerText}</span>
                    </div>
                    ${!p.paid ? `
                        <div class="payment-buttons">
                            <button class="btn-small btn-blue" onclick="payPayment(${p.id})">✅ Оплатить</button>
                            <button class="btn-small btn-red" onclick="deletePayment(${p.id})">❌ Удалить</button>
                        </div>
                    ` : ''}
                </div>
            `;
        });

        document.getElementById('paymentsList').innerHTML = html;
        document.getElementById('totalPayments').textContent = totalUnpaid.toLocaleString() + ' ₽';
        document.getElementById('nextPayment').textContent = nextDays ? nextDays + ' д' : 'Нет';
    }

    window.payPayment = function(id) {
        const payment = payments.find(p => p.id === id);
        if (payment) {
            payment.paid = true;
            updateDisplay();
        }
    };

    window.deletePayment = function(id) {
        payments = payments.filter(p => p.id !== id);
        updateDisplay();
    };

    window.addPayment = function() {
        const title = document.getElementById('paymentTitle').value;
        const amount = parseFloat(document.getElementById('paymentAmount').value);
        const date = document.getElementById('paymentDate').value;

        if (title && amount && date) {
            payments.push({
                id: Date.now(),
                title,
                amount,
                date,
                paid: false
            });
            updateDisplay();
            document.getElementById('paymentTitle').value = '';
            document.getElementById('paymentAmount').value = '';
        }
    };

    updateDisplay();
</script>
</body>
</html>
