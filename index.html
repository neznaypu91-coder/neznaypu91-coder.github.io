<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>План погашения — остаток на жизнь с копилкой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px 40px;
            color: #0f172a;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .total-card {
            background: #0f172a;
            color: white;
            border-radius: 32px;
            padding: 1rem;
            margin: 12px 0 20px;
            text-align: center;
        }
        .total-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .total-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: #facc15;
        }
        .reminder-note {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .debts-editor {
            background: white;
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .debts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .debt-edit {
            flex: 1 1 140px;
        }
        .debt-edit label {
            font-size: 0.7rem;
            font-weight: 600;
            display: block;
            color: #475569;
        }
        .debt-edit input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .income-row {
            background: #e6f0ff;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .income-row label {
            font-weight: 600;
            font-size: 0.8rem;
            display: block;
        }
        .income-row input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            margin-top: 4px;
        }
        .creditor-block {
            border-top: 1px solid #e2e8f0;
            margin-top: 12px;
            padding-top: 12px;
        }
        .creditor-title {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .payment-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .payment-field {
            flex: 1;
        }
        .payment-field label {
            font-size: 0.7rem;
            display: block;
            color: #475569;
        }
        .payment-field input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .remain {
            font-size: 0.7rem;
            color: #f97316;
            margin-top: 4px;
            font-weight: 500;
        }
        .life-save-row {
            display: flex;
            gap: 12px;
            margin: 16px 0 12px;
            align-items: center;
        }
        .life-result {
            flex: 2;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 28px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .save-field {
            flex: 1;
        }
        .save-field label {
            font-size: 0.7rem;
            font-weight: 600;
            display: block;
        }
        .save-field input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
        }
        .savings-total {
            font-size: 0.75rem;
            background: #e6f0ff;
            padding: 6px 10px;
            border-radius: 20px;
            margin-top: 8px;
        }
        .save-btn {
            background: #f97316;
            border: none;
            border-radius: 40px;
            padding: 8px;
            color: white;
            font-weight: 500;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 План погашения</h1>
    <div class="total-card">
        <div class="total-label">Напоминалка (общий долг)</div>
        <div class="total-amount" id="totalAmount">0 ₽</div>
        <div class="reminder-note">⚠️ Не меняется от платежей</div>
    </div>

    <div class="debts-editor">
        <div style="font-weight: 600; margin-bottom: 8px;">✏️ Редактируй текущие остатки долгов</div>
        <div class="debts-grid" id="debtsEditor"></div>
    </div>

    <div id="app"></div>
    <div class="footer">📌 Остаток на жизнь = Заработал − (все внесённые платежи) − (копилка)</div>
</div>

<script>
    let initialDebts = {
        sber: 152341,
        tbank: 82632,
        yandex: 97097,
        alfa_loan: 35325,
        alfa_card: 17412,
        babushka: 270000
    };

    let monthsData = {
        april: { name: "Апрель", income: 126000,
            payments: {
                sber: { paid: 50000, interest: 4000 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa_loan: { paid: 0, interest: 0 },
                alfa_card: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            save: 20000
        },
        may: { name: "Май", income: 126000,
            payments: {
                sber: { paid: 50000, interest: 4000 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa_loan: { paid: 0, interest: 0 },
                alfa_card: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            save: 20000
        },
        june: { name: "Июнь", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa_loan: { paid: 0, interest: 0 },
                alfa_card: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            save: 20000
        },
        july: { name: "Июль", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa_loan: { paid: 0, interest: 0 },
                alfa_card: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            save: 20000
        },
        august: { name: "Август", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa_loan: { paid: 0, interest: 0 },
                alfa_card: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            save: 20000
        },
        september: { name: "Сентябрь", income: 126000,
            payments: {
                sber: { paid: 0, interest: 0 },
                tbank: { paid: 0, interest: 0 },
                yandex: { paid: 0, interest: 0 },
                alfa_loan: { paid: 0, interest: 0 },
                alfa_card: { paid: 0, interest: 0 },
                babushka: { paid: 20000, interest: 0 }
            },
            save: 20000
        }
    };

    function getCumulativeSave(monthKey) {
        const order = ["april", "may", "june", "july", "august", "september"];
        let total = 0;
        for (let m of order) {
            total += monthsData[m]?.save || 0;
            if (m === monthKey) break;
        }
        return total;
    }

    try {
        const savedDebts = localStorage.getItem("plan_life_with_save");
        if (savedDebts) initialDebts = JSON.parse(savedDebts);
        const savedMonths = localStorage.getItem("plan_life_with_save_months");
        if (savedMonths) monthsData = JSON.parse(savedMonths);
    } catch(e) {}

    function saveAll() {
        localStorage.setItem("plan_life_with_save", JSON.stringify(initialDebts));
        localStorage.setItem("plan_life_with_save_months", JSON.stringify(monthsData));
        updateTotalDisplay();
        render();
    }

    function updateTotalDisplay() {
        const total = initialDebts.sber + initialDebts.tbank + initialDebts.yandex + initialDebts.alfa_loan + initialDebts.alfa_card + initialDebts.babushka;
        document.getElementById("totalAmount").innerText = total.toLocaleString('ru-RU') + " ₽";
        const editorDiv = document.getElementById("debtsEditor");
        editorDiv.innerHTML = `
            <div class="debt-edit"><label>🏦 Сбер</label><input type="number" id="edit_sber" value="${initialDebts.sber}"></div>
            <div class="debt-edit"><label>🏦 Т‑банк</label><input type="number" id="edit_tbank" value="${initialDebts.tbank}"></div>
            <div class="debt-edit"><label>🔁 Яндекс</label><input type="number" id="edit_yandex" value="${initialDebts.yandex}"></div>
            <div class="debt-edit"><label>🔁 Альфа займ</label><input type="number" id="edit_alfa_loan" value="${initialDebts.alfa_loan}"></div>
            <div class="debt-edit"><label>💳 Альфа кред</label><input type="number" id="edit_alfa_card" value="${initialDebts.alfa_card}"></div>
            <div class="debt-edit"><label>👵 Бабушка</label><input type="number" id="edit_babushka" value="${initialDebts.babushka}"></div>
        `;
        document.getElementById("edit_sber")?.addEventListener("change", (e) => { initialDebts.sber = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_tbank")?.addEventListener("change", (e) => { initialDebts.tbank = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_yandex")?.addEventListener("change", (e) => { initialDebts.yandex = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_alfa_loan")?.addEventListener("change", (e) => { initialDebts.alfa_loan = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_alfa_card")?.addEventListener("change", (e) => { initialDebts.alfa_card = parseFloat(e.target.value) || 0; saveAll(); });
        document.getElementById("edit_babushka")?.addEventListener("change", (e) => { initialDebts.babushka = parseFloat(e.target.value) || 0; saveAll(); });
    }

    function computeRemainingAfterMonth(monthKey) {
        const monthsOrder = ["april", "may", "june", "july", "august", "september"];
        let remaining = { ...initialDebts };
        for (let m of monthsOrder) {
            const month = monthsData[m];
            if (!month) continue;
            for (let creditor of ["sber", "tbank", "yandex", "alfa_loan", "alfa_card", "babushka"]) {
                const paid = month.payments[creditor]?.paid || 0;
                const interest = month.payments[creditor]?.interest || 0;
                const body = paid - interest;
                if (body > 0) {
                    if (creditor === "babushka") {
                        remaining.babushka -= paid;
                    } else {
                        remaining[creditor] -= body;
                    }
                    if (remaining[creditor] < 0) remaining[creditor] = 0;
                }
            }
            if (m === monthKey) break;
        }
        return remaining;
    }

    function render() {
        const app = document.getElementById("app");
        if (!app) return;
        let html = "";
        const monthsOrder = ["april", "may", "june", "july", "august", "september"];
        for (const monthKey of monthsOrder) {
            const month = monthsData[monthKey];
            if (!month) continue;
            const cumSave = getCumulativeSave(monthKey);
            const totalPayments = (month.payments.sber.paid || 0) + (month.payments.tbank.paid || 0) + (month.payments.yandex.paid || 0) + (month.payments.alfa_loan.paid || 0) + (month.payments.alfa_card.paid || 0) + (month.payments.babushka.paid || 0);
            const lifeRemain = month.income - totalPayments - month.save;
            html += `<div class="card">
                <h2>📆 ${month.name}</h2>
                <div class="income-row">
                    <label>💰 Заработал за месяц (₽)</label>
                    <input type="number" class="income-input" data-month="${monthKey}" value="${month.income}">
                </div>`;
            for (let creditor of ["sber", "tbank", "yandex", "alfa_loan", "alfa_card", "babushka"]) {
                let label = "";
                if (creditor === "sber") label = "🏦 Сбер";
                else if (creditor === "tbank") label = "🏦 Т‑банк";
                else if (creditor === "yandex") label = "🔁 Яндекс";
                else if (creditor === "alfa_loan") label = "🔁 Альфа (займ)";
                else if (creditor === "alfa_card") label = "💳 Альфа (кредитка)";
                else label = "👵 Бабушка";
                html += `<div class="creditor-block">
                    <div class="creditor-title">${label}</div>
                    <div class="payment-row">
                        <div class="payment-field"><label>Вношу (₽)</label><input type="number" class="payment-paid" data-month="${monthKey}" data-creditor="${creditor}" value="${month.payments[creditor].paid}"></div>
                        <div class="payment-field"><label>Проценты (₽)</label><input type="number" class="payment-interest" data-month="${monthKey}" data-creditor="${creditor}" value="${month.payments[creditor].interest}"></div>
                    </div>
                    <div class="remain" id="remain-${creditor}-${monthKey}"></div>
                </div>`;
            }
            html += `<div class="life-save-row">
                    <div class="life-result">🏠 Остаток на жизнь: <strong>${lifeRemain.toLocaleString('ru-RU')} ₽</strong></div>
                    <div class="save-field"><label>🐖 В копилку (₽)</label><input type="number" class="save-input" data-month="${monthKey}" value="${month.save}"></div>
                </div>
                <div class="savings-total">💰 Всего в копилке на этот месяц: <strong>${cumSave.toLocaleString('ru-RU')} ₽</strong></div>
                <button class="save-month-btn" data-month="${monthKey}">💾 Сохранить план на месяц</button>
            </div>`;
        }
        app.innerHTML = html;

        for (const monthKey of monthsOrder) {
            const remaining = computeRemainingAfterMonth(monthKey);
            for (let creditor of ["sber", "tbank", "yandex", "alfa_loan", "alfa_card", "babushka"]) {
                const remainSpan = document.getElementById(`remain-${creditor}-${monthKey}`);
                if (remainSpan) {
                    const val = remaining[creditor];
                    if (val !== undefined && monthsData[monthKey].payments[creditor].paid > 0) {
                        remainSpan.innerText = `📉 После платежа останется: ${val.toLocaleString('ru-RU')} ₽`;
                    } else {
                        remainSpan.innerText = ``;
                    }
                }
            }
        }

        document.querySelectorAll(".income-input, .payment-paid, .payment-interest, .save-input").forEach(input => {
            input.addEventListener("change", function() {
                const monthKey = this.getAttribute("data-month");
                const month = monthsData[monthKey];
                const creditor = this.getAttribute("data-creditor");
                if (this.classList.contains("income-input")) {
                    month.income = parseFloat(this.value) || 0;
                }
                if (creditor && this.classList.contains("payment-paid")) {
                    month.payments[creditor].paid = parseFloat(this.value) || 0;
                }
                if (creditor && this.classList.contains("payment-interest")) {
                    month.payments[creditor].interest = parseFloat(this.value) || 0;
                }
                if (this.classList.contains("save-input")) {
                    month.save = parseFloat(this.value) || 0;
                }
                saveAll();
                render();
            });
        });

        document.querySelectorAll(".save-month-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                const monthKey = this.getAttribute("data-month");
                const month = monthsData[monthKey];
                alert(`✅ План на ${month.name} сохранён.`);
                saveAll();
            });
        });
    }

    updateTotalDisplay();
    render();
</script>
</body>
</html>
